<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Turni & Debiti</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  :root {
    --bg: #050816;
    --card: rgba(255, 255, 255, 0.08);
    --card-strong: rgba(255, 255, 255, 0.14);
    --border: rgba(255, 255, 255, 0.16);
    --text: #f8fafc;
    --muted: #94a3b8;
    --cyan: #22d3ee;
    --blue: #3b82f6;
    --violet: #8b5cf6;
    --green: #22c55e;
    --red: #fb7185;
  }

  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at 15% 10%, rgba(34, 211, 238, 0.28), transparent 28%),
      radial-gradient(circle at 85% 20%, rgba(139, 92, 246, 0.28), transparent 30%),
      radial-gradient(circle at 50% 95%, rgba(34, 197, 94, 0.16), transparent 28%),
      linear-gradient(135deg, #020617 0%, #050816 45%, #111827 100%);
    color: var(--text);
    font-family: system-ui, Arial, sans-serif;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(circle at center, black, transparent 75%);
  }

  body::after {
    content: "";
    position: fixed;
    width: 420px;
    height: 420px;
    left: -120px;
    bottom: -120px;
    background: radial-gradient(circle, rgba(34, 211, 238, 0.22), transparent 65%);
    filter: blur(10px);
    pointer-events: none;
    animation: floatGlow 8s ease-in-out infinite alternate;
  }

  @keyframes floatGlow {
    from { transform: translate(0, 0) scale(1); }
    to { transform: translate(80px, -50px) scale(1.15); }
  }

  .container {
    max-width: 1250px;
  }

  .app-card {
    border: 1px solid var(--border);
    border-radius: 34px;
    background: rgba(15, 23, 42, 0.72);
    backdrop-filter: blur(22px);
    box-shadow:
      0 30px 90px rgba(0, 0, 0, 0.45),
      inset 0 1px 0 rgba(255,255,255,0.12);
    overflow: hidden;
  }

  .hero {
    position: relative;
    background:
      linear-gradient(135deg, rgba(34, 211, 238, 0.22), rgba(139, 92, 246, 0.22)),
      rgba(255,255,255,0.04);
    color: white;
    padding: 38px;
    overflow: hidden;
  }

  .hero::before {
    content: "";
    position: absolute;
    inset: -80px;
    background:
      radial-gradient(circle at 20% 20%, rgba(34, 211, 238, 0.45), transparent 22%),
      radial-gradient(circle at 80% 40%, rgba(139, 92, 246, 0.42), transparent 24%);
    filter: blur(30px);
    opacity: 0.75;
  }

  .hero > * {
    position: relative;
    z-index: 1;
  }

  .hero h1 {
    font-weight: 900;
    letter-spacing: -1px;
    font-size: clamp(34px, 5vw, 58px);
    text-shadow: 0 0 28px rgba(34, 211, 238, 0.35);
  }

  .hero p {
    color: #dbeafe;
    font-size: 17px;
    margin-bottom: 0;
  }

  .toolbar {
    background: rgba(2, 6, 23, 0.45);
    padding: 22px 26px;
    border-bottom: 1px solid var(--border);
  }

  .btn {
    border-radius: 999px;
    padding: 11px 20px;
    font-weight: 800;
    letter-spacing: 0.02em;
    border: 1px solid rgba(255,255,255,0.18);
    transition: 0.2s ease;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(34, 211, 238, 0.18);
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--cyan), var(--blue));
    border: 0;
    color: #020617;
  }

  .btn-outline-primary {
    color: var(--cyan);
    border-color: rgba(34, 211, 238, 0.45);
    background: rgba(34, 211, 238, 0.06);
  }

  .btn-outline-danger {
    color: var(--red);
    border-color: rgba(251, 113, 133, 0.45);
    background: rgba(251, 113, 133, 0.06);
  }

  .status {
    border-radius: 999px;
    background: rgba(34, 211, 238, 0.1);
    border: 1px solid rgba(34, 211, 238, 0.35);
    color: #a5f3fc;
    font-size: 13px;
    font-weight: 800;
    padding: 9px 16px;
    box-shadow: 0 0 22px rgba(34, 211, 238, 0.12);
  }

  .table-wrap {
    padding: 26px;
    background: rgba(2, 6, 23, 0.28);
  }

  .table {
    color: var(--text);
    margin-bottom: 0;
    border-collapse: separate;
    border-spacing: 0 10px;
  }

  thead th {
    background: transparent !important;
    color: #a5f3fc !important;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.11em;
    border: 0 !important;
    padding: 14px 16px !important;
  }

  tbody tr {
    background: rgba(255, 255, 255, 0.055);
    backdrop-filter: blur(12px);
    transition: 0.18s ease;
  }

  tbody tr:hover {
    background: rgba(34, 211, 238, 0.10);
    transform: scale(1.006);
    box-shadow: 0 0 30px rgba(34, 211, 238, 0.10);
  }

  tbody td {
    border-top: 1px solid rgba(255,255,255,0.10) !important;
    border-bottom: 1px solid rgba(255,255,255,0.10) !important;
    padding: 16px !important;
    vertical-align: middle;
  }

  tbody td:first-child {
    border-left: 1px solid rgba(255,255,255,0.10) !important;
    border-radius: 18px 0 0 18px;
  }

  tbody td:last-child {
    border-right: 1px solid rgba(255,255,255,0.10) !important;
    border-radius: 0 18px 18px 0;
  }

  input, select {
    border-radius: 16px !important;
    border: 1px solid rgba(148, 163, 184, 0.28) !important;
    padding: 12px 14px !important;
    background-color: rgba(15, 23, 42, 0.82) !important;
    color: white !important;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  }

  input:focus, select:focus {
    border-color: var(--cyan) !important;
    box-shadow:
      0 0 0 4px rgba(34, 211, 238, 0.14),
      0 0 26px rgba(34, 211, 238, 0.22) !important;
  }

  select option {
    background: #020617;
    color: white;
  }

  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    opacity: 0.9;
  }

  .debt-cell {
    font-weight: 950;
    font-size: 22px;
    color: #fda4af;
    text-shadow: 0 0 18px rgba(251, 113, 133, 0.35);
  }

  .situation-cell {
    font-size: 15px;
    color: #e0f2fe;
    font-weight: 800;
  }

  .note-box {
    margin-top: 26px;
    background:
      linear-gradient(135deg, rgba(34, 211, 238, 0.10), rgba(139, 92, 246, 0.10)),
      rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 20px 22px;
    color: #dbeafe;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .note-box strong {
    color: white;
  }

  .badge-soft {
    display: inline-block;
    padding: 8px 13px;
    border-radius: 999px;
    background: rgba(34, 211, 238, 0.14);
    border: 1px solid rgba(34, 211, 238, 0.35);
    color: #a5f3fc;
    font-weight: 900;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    box-shadow: 0 0 22px rgba(34, 211, 238, 0.14);
  }

  @media (max-width: 768px) {
    .hero {
      padding: 28px;
    }

    .toolbar {
      padding: 18px;
    }

    .table-wrap {
      padding: 14px;
    }

    .btn {
      width: 100%;
    }

    
  }
  
  .table {
  --bs-table-bg: transparent !important;
  --bs-table-striped-bg: transparent !important;
  --bs-table-hover-bg: transparent !important;
  --bs-table-color: white !important;
  background: transparent !important;
}

.table > :not(caption) > * > * {
  background: transparent !important;
  color: white !important;
}

tbody,
thead,
tr,
td,
th {
  background: transparent !important;
}

.table-responsive {
  background: transparent !important;
}

.table-responsive {
  overflow-x: hidden !important;
}

body {
  overflow-x: hidden;
}

.table {
  min-width: unset !important;
  width: 100% !important;
}
</style>

<body>
  <div class="container py-4 py-md-5">
    <div class="card app-card">
      <div class="hero">
        <span class="badge-soft mb-3">Turni cane</span>
        <h1 class="mb-2">Turni & Debiti</h1>
        <p>Gestione 1:1 tra Lorenzo e Francesco. I neutri non contano.</p>
      </div>

      <div class="toolbar">
        <div class="d-flex flex-column flex-md-row gap-2 align-items-md-center justify-content-between">
          <div class="d-flex flex-column flex-md-row gap-2">
            <button id="addRow" class="btn btn-primary">+ Aggiungi riga</button>
            <button id="recalc" class="btn btn-outline-primary">Ricalcola</button>
            <button id="clear" class="btn btn-outline-danger">Svuota</button>
          </div>

          <span id="status" class="status">Pronto</span>
        </div>
      </div>

      <div class="table-wrap">
        <div class="table-responsive">
          <table id="t" class="table table-hover align-middle mb-0">
            <thead>
              <tr>
                <th style="width: 170px;">Data</th>
                <th style="width: 240px;">Chi è andato</th>
                <th style="width: 190px;">Debito attuale</th>
                <th>Situazione</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="note-box mt-4">
          <strong>Regola:</strong>
          contano solo <strong>Lorenzo</strong> e <strong>Francesco</strong>.
          Campagna, Mamma, Zia e Nonni sono neutri. Il rapporto deve rimanere
          <strong>1:1</strong>.
        </div>
      </div>
    </div>
  </div>

<script>
(function () {
  const API_URL = "/api/data";

  const NEUTRI = new Set(["Campagna", "Mamma", "Zia", "Nonni"]);
  const PERSONE = ["Lorenzo", "Francesco", "Campagna", "Mamma", "Zia", "Nonni"];

  const tbody = document.querySelector("#t tbody");
  const btnAdd = document.querySelector("#addRow");
  const btnRecalc = document.querySelector("#recalc");
  const btnClear = document.querySelector("#clear");
  const statusEl = document.querySelector("#status");

  function setStatus(txt) {
    statusEl.textContent = txt;
  }

  function calcolaDebito(conteggio) {
    const diff = conteggio.Lorenzo - conteggio.Francesco;

    if (diff > 0) {
      return diff + "F";
    }

    if (diff < 0) {
      return Math.abs(diff) + "L";
    }

    return "";
  }

  function addRow(data = "", who = "") {
    const tr = document.createElement("tr");

    const tdA = document.createElement("td");
    const inpDate = document.createElement("input");
    inpDate.type = "date";
    inpDate.value = data;
    inpDate.className = "form-control";
    tdA.appendChild(inpDate);

    const tdB = document.createElement("td");
    const sel = document.createElement("select");
    sel.className = "form-select";

    const optEmpty = document.createElement("option");
    optEmpty.value = "";
    optEmpty.textContent = "—";
    sel.appendChild(optEmpty);

    for (const p of PERSONE) {
      const o = document.createElement("option");
      o.value = p;
      o.textContent = p;
      sel.appendChild(o);
    }

    sel.value = who;
    tdB.appendChild(sel);

    const tdC = document.createElement("td");
    tdC.className = "debt-cell";
    tdC.textContent = "";

    const tdInfo = document.createElement("td");
    tdInfo.className = "situation-cell";
    tdInfo.textContent = "";

    tr.appendChild(tdA);
    tr.appendChild(tdB);
    tr.appendChild(tdC);
    tr.appendChild(tdInfo);

    tbody.appendChild(tr);

    sel.addEventListener("change", () => {
      recalc();
      scheduleAutoSave();
    });

    inpDate.addEventListener("change", () => {
      recalc();
      scheduleAutoSave();
    });
  }

function recalc() {
  const rows = Array.from(tbody.querySelectorAll("tr"));

  let ultimoValido = null;

  let debito = {
    who: null,
    n: 0
  };

  for (const tr of rows) {
    const who = tr.children[1].querySelector("select").value;

    if (!who) {
      tr.children[2].textContent = formatDebito(debito);
      tr.children[3].textContent = "";
      continue;
    }

    if (NEUTRI.has(who)) {
      tr.children[2].textContent = formatDebito(debito);
      tr.children[3].textContent = "Neutro: non conta";
      continue;
    }

    if (ultimoValido === null) {
      ultimoValido = who;
      tr.children[2].textContent = "";
      tr.children[3].textContent = "Primo turno valido";
      continue;
    }

    if (debito.n > 0) {
      if (who === debito.who) {
        debito.n--;

        if (debito.n === 0) {
          tr.children[3].textContent = "Debito saldato";
          debito.who = null;
          ultimoValido = who;
        } else {
          tr.children[3].textContent = who + " recupera un debito";
        }
      } else {
        debito.n++;
        tr.children[3].textContent = debito.who + " deve recuperare";
      }

      tr.children[2].textContent = formatDebito(debito);
      continue;
    }

    if (who === ultimoValido) {
      const altro = who === "Lorenzo" ? "Francesco" : "Lorenzo";

      debito.who = altro;
      debito.n = 2;

      tr.children[3].textContent = altro + " deve recuperare";
    } else {
      tr.children[3].textContent = "Turno corretto";
      ultimoValido = who;
    }

    tr.children[2].textContent = formatDebito(debito);
  }
}
function formatDebito(debito) {
  if (!debito.who || debito.n <= 0) {
    return "";
  }

  if (debito.who === "Lorenzo") {
    return debito.n + "L";
  }

  if (debito.who === "Francesco") {
    return debito.n + "F";
  }

  return "";
}
function formatDebito(debiti) {
  if (debiti.Lorenzo > 0) {
    return debiti.Lorenzo + "L";
  }

  if (debiti.Francesco > 0) {
    return debiti.Francesco + "F";
  }

  return "";
}

  function collectRows() {
    return Array.from(tbody.querySelectorAll("tr")).map(tr => {
      const date = tr.children[0].querySelector("input").value || "";
      const who = tr.children[1].querySelector("select").value || "";
      return { date, who };
    });
  }

  function applyRows(rows) {
    tbody.innerHTML = "";

    for (const r of rows) {
      addRow(r.date || "", r.who || "");
    }

    if (rows.length === 0) {
      for (let i = 0; i < 10; i++) addRow();
    }

    recalc();
  }

  async function loadOnline() {
    setStatus("Caricamento…");

    const r = await fetch(API_URL, { cache: "no-store" });
    if (!r.ok) throw new Error("Load failed");

    const data = await r.json();
    applyRows(Array.isArray(data.rows) ? data.rows : []);

    setStatus("Pronto");
  }

  let saveTimer = null;
  let saving = false;
  let pending = false;

  async function saveOnlineNow() {
    if (saving) {
      pending = true;
      return;
    }

    saving = true;
    pending = false;

    setStatus("Salvataggio…");

    const payload = { rows: collectRows() };

    const r = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
      keepalive: true
    });

    saving = false;

    if (!r.ok) {
      setStatus("Errore salvataggio");
      console.warn("Save failed", await r.text());
    } else {
      setStatus("Salvato");
      setTimeout(() => setStatus("Pronto"), 800);
    }

    if (pending) {
      saveOnlineNow();
    }
  }

  function scheduleAutoSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveOnlineNow, 600);
  }

  btnAdd.addEventListener("click", () => {
    addRow();
    recalc();
    scheduleAutoSave();
  });

  btnRecalc.addEventListener("click", recalc);

  btnClear.addEventListener("click", () => {
    tbody.innerHTML = "";
    for (let i = 0; i < 10; i++) addRow();
    recalc();
    scheduleAutoSave();
  });

  window.addEventListener("beforeunload", () => {
    saveOnlineNow();
  });

  (async () => {
    try {
      await loadOnline();
    } catch (e) {
      console.warn(e);
      tbody.innerHTML = "";
      for (let i = 0; i < 10; i++) addRow();
      recalc();
      setStatus("Pronto");
    }
  })();

})();
</script>
</body>
</html>
